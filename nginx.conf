# ─────────────────────────────────────────────────────────────
#  Nginx config for websevix.com
#  Place at: /etc/nginx/sites-available/websevix
#  Then: ln -sf /etc/nginx/sites-available/websevix /etc/nginx/sites-enabled/websevix
#        rm -f /etc/nginx/sites-enabled/default
#        nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────

# VPS IP — HTTP (works even before domain / SSL)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript text/xml application/xml
               image/svg+xml font/woff2;

    # CSS + JS bundles — served directly from disk (fast, no Node overhead)
    # Using 'root': URL /_next/static/... maps to
    #   /var/www/websevix/.next/standalone/_next/static/...
    location ^~ /_next/static/ {
        root /var/www/websevix/.next/standalone;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Everything else → Next.js app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}

# Domain HTTP — redirect to HTTPS (only after SSL / domain pointed)
server {
    listen 80;
    listen [::]:80;
    server_name websevix.com www.websevix.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }
    location / { return 301 https://websevix.com$request_uri; }
}

# Domain HTTPS (only after certbot — remove if SSL not yet set up)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name websevix.com www.websevix.com;

    ssl_certificate     /etc/letsencrypt/live/websevix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/websevix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript text/xml application/xml
               image/svg+xml font/woff2;

    location ^~ /_next/static/ {
        root /var/www/websevix/.next/standalone;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
