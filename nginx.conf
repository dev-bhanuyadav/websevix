# Nginx config — websevix.com with HTTPS
# After certbot: this file gets auto-updated
# cp nginx.conf /etc/nginx/sites-available/websevix
# nginx -t && systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name websevix.com www.websevix.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }
    location / { return 301 https://websevix.com$request_uri; }
}

# HTTP fallback for direct IP access
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript text/xml application/xml image/svg+xml font/woff2;

    location ^~ /_next/static/ {
        alias /var/www/websevix/.next/standalone/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ^~ /public/ {
        alias /var/www/websevix/.next/standalone/public/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# HTTPS (only after certbot)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name websevix.com www.websevix.com;

    ssl_certificate     /etc/letsencrypt/live/websevix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/websevix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript text/xml application/xml image/svg+xml font/woff2;

    location ^~ /_next/static/ {
        alias /var/www/websevix/.next/standalone/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ^~ /public/ {
        alias /var/www/websevix/.next/standalone/public/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
