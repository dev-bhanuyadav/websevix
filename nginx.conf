# ─────────────────────────────────────────────────────────────
#  Nginx — websevix.com + VPS IP dono pe chalega
#  Place: /etc/nginx/sites-available/websevix
#  Then: ln -sf /etc/nginx/sites-available/websevix /etc/nginx/sites-enabled/
#        rm -f /etc/nginx/sites-enabled/default
#        nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────

# VPS IP se visit (http://YOUR_IP) — yahi default server
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /_next/static/ {
        alias /var/www/websevix/.next/standalone/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# Domain — HTTP redirect to HTTPS (SSL setup ke baad enable)
server {
    listen 80;
    listen [::]:80;
    server_name websevix.com www.websevix.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; allow all; }
    location / { return 301 https://websevix.com$request_uri; }
}

# Domain — HTTPS (certbot run karne ke baad hi kaam karega)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name websevix.com www.websevix.com;

    ssl_certificate     /etc/letsencrypt/live/websevix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/websevix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /_next/static/ {
        alias /var/www/websevix/.next/standalone/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
