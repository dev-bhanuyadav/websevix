# ─────────────────────────────────────────────────────────────
#  Nginx config for websevix.com
#  Place at: /etc/nginx/sites-available/websevix
#  Then: sudo ln -s /etc/nginx/sites-available/websevix /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name websevix.com www.websevix.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://websevix.com$request_uri; }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name websevix.com www.websevix.com;

    # SSL — filled in by Certbot automatically
    ssl_certificate     /etc/letsencrypt/live/websevix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/websevix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # Max upload size (for file sharing in chat)
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Static files served directly (fast, no Node.js overhead)
    location /_next/static/ {
        alias /var/www/websevix/.next/standalone/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /public/ {
        alias /var/www/websevix/.next/standalone/public/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Everything else → Next.js (port 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
